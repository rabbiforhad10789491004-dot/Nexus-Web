    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDFs_g_3VDGrRs1SHVYrJ2nz-lu5XLMkwA", authDomain: "nexus-e-sports-24b88.firebaseapp.com", projectId: "nexus-e-sports-24b88", storageBucket: "nexus-e-sports-24b88.firebasestorage.app", messagingSenderId: "731484768866", appId: "1:731484768866:web:da8b6610217a2c89679f3b" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        function getYouTubeEmbedUrl(url) {
            if(!url) return "";
            const regex = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/i;
            const match = url.match(regex);
            if (match && match[1]) { return "https://www.youtube.com/embed/" + match[1] + "?autoplay=0&rel=0"; }
            return url; 
        }

        async function loadWebsiteData() {
            try {
                let snap = await getDoc(doc(db, "WebSettings", "main"));
                
                if(snap.exists()) {
                    let data = snap.data();
                    
                    if(data.bannerUrl) document.getElementById('display-banner').src = data.bannerUrl;
                    if(data.supportLink) document.getElementById('support-btn').href = data.supportLink;

                    // 🔥 FIREBASE APK LINK BINDING 🔥
                    if(data.apkLink) {
                        document.getElementById('download-btn').href = data.apkLink;
                    } else {
                        document.getElementById('download-btn').innerHTML = "<i class='fa-solid fa-lock'></i> APP COMING SOON";
                        document.getElementById('download-btn').style.background = "#333";
                        document.getElementById('download-btn').style.color = "#888";
                        document.getElementById('download-btn').style.boxShadow = "none";
                        document.getElementById('download-btn').onclick = (e) => e.preventDefault();
                    }

                    if(data.youtubeLink) {
                        let embedLink = getYouTubeEmbedUrl(data.youtubeLink);
                        if(embedLink) {
                            document.getElementById('display-video').src = embedLink;
                            document.getElementById('video-wrapper').style.display = "block";
                        } else {
                            document.getElementById('how-to-btn').style.display = "none";
                            document.getElementById('video-section').style.display = "none";
                        }
                    } else {
                        document.getElementById('how-to-btn').style.display = "none";
                        document.getElementById('video-section').style.display = "none";
                    }
                }
                
                document.getElementById('loading').style.display = "none";
                document.getElementById('website-content').style.display = "block";
                
            } catch(e) {
                document.getElementById('loading').innerHTML = "<i class='fa-solid fa-triangle-exclamation'></i> Error loading data!";
                document.getElementById('loading').style.color = "#ff3333";
            }
        }
        loadWebsiteData();
    </script>
